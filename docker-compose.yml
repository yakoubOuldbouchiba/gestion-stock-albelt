version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: albelt-postgres
    environment:
      POSTGRES_DB: albelt_db
      POSTGRES_USER: albelt_user
      POSTGRES_PASSWORD: albelt_secure_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albelt_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - albelt-network

  # Spring Boot Backend API
