spring:
  application:
    name: albelt-api
  
  # JPA and Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for migrations
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
          use_scrollable_resultset: true
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false
  
  # Flyway Migration Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: false
    out-of-order: false
  
  # DataSource Configuration
  datasource:
    # For local dev, defaults point to localhost.
    # In Render/CI, prefer setting SPRING_DATASOURCE_URL/USERNAME/PASSWORD or DATABASE_URL.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/albelt_db}
    username: ${SPRING_DATASOURCE_USERNAME:albelt_user}
    password: ${SPRING_DATASOURCE_PASSWORD:albelt_secure_password_123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
  
  # Web Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Jackson Configuration (JSON serialization)
  jackson:
    serialization:
      write-dates-as-timestamps: true
      indent-output: true
    default-property-inclusion: non_null
    time-zone: UTC
  
  # Thymeleaf Configuration (if needed)
  thymeleaf:
    enabled: false

# Server Configuration
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    session:
      timeout: 30m
      tracking-modes: cookie  # Disable URL rewriting
  error:
    include-binding-errors: always
    include-message: always
    include-exception: false
    include-stacktrace: on_param
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Logging Configuration
logging:
  level:
    root: INFO
    com.albelt.gestionstock: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/albelt-api.log
    max-size: 10MB
    max-history: 30

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

# Application-specific Configuration
albel:
  api:
    version: 1.0.0
    cors:
      # Comma-separated list. On Render set ALBEL_API_CORS_ALLOWED_ORIGINS to your UI demo URL.
      allowed-origins: ${ALBEL_API_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      max-age: 86400
  
  # JWT Configuration
  jwt:
    secret: albelt-stock-management-system-secret-key-2026
    expiration: 86400000  # 24 hours in milliseconds
  
  # FIFO Configuration
  fifo:
    enable-analytics: true
    batch-size: 100
  
  # Waste Management Configuration
  waste:
    large-waste-threshold-mm: 3000
    scrap-threshold-area-m2: 3.0
    enable-reuse-optimization: true
  
  # Nesting Algorithm Configuration (ready for integration)
  nesting:
    enable-optimization: false
    algorithm: guillotine-2d
    max-execution-time-ms: 2000
    target-utilization: 0.85

# Profile-specific configurations
---
spring:
  config:
    activate:
      on-profile: development
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    root: DEBUG
    com.albelt.gestionstock: DEBUG

---
spring:
  config:
    activate:
      on-profile: production
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
logging:
  level:
    root: WARN
    com.albelt.gestionstock: INFO
server:
  error:
    include-stacktrace: never
