services:
  - type: web
    runtime: static
    name: gestion-stock-albelt-1
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gestion-stock-albelt.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
